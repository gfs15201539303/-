<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>枭雄汉化后台</title>
</head>
<body>
  <script src="/dictionary.js"></script>
  <script src="/translator.js"></script>
  <script>
    (function() {
      var started = false;

      function startTranslation() {
        if (started) return;
        started = true;

        // 尝试访问父页面 DOM（同源策略允许时）
        try {
          if (parent && parent.document && parent.document !== document) {
            var ok = ChineseTranslator.start(parent.document);
            if (ok) {
              console.log('[枭雄汉化] 界面汉化已启动');
            } else {
              console.warn('[枭雄汉化] 无法启动界面汉化');
            }
          } else {
            console.log('[枭雄汉化] 不在 OBR 框架中，跳过自动汉化');
          }
        } catch(e) {
          console.warn('[枭雄汉化] 无法访问父页面，汉化未启动:', e.message);
        }
      }

      // OBR SDK 就绪后启动汉化
      if (typeof OBR !== 'undefined') {
        OBR.onReady(function() {
          console.log('[枭雄汉化] 后台已就绪');
          startTranslation();
        });

        // 若 OBR.onReady 已触发，兜底
        if (OBR.isReady && OBR.isReady()) {
          startTranslation();
        }
      } else {
        // 无 OBR SDK 时（开发/调试模式）延迟尝试
        console.log('[枭雄汉化] OBR SDK 未加载，尝试直接启动');
        if (document.readyState === 'complete' || document.readyState === 'interactive') {
          startTranslation();
        } else {
          document.addEventListener('DOMContentLoaded', startTranslation);
        }
      }

      // 监听来自弹出窗口的消息
      window.addEventListener('message', function(event) {
        try {
          var data = typeof event.data === 'string' ? JSON.parse(event.data) : event.data;
        } catch(e) {
          return;
        }

        if (data && data.source === 'xiaoxiong-localizer') {
          switch (data.action) {
            case 'setEnabled':
              ChineseTranslator.setEnabled(data.value);
              break;
            case 'getStats':
              // 通过 Channel 或 localStorage 告知弹窗
              try {
                localStorage.setItem('xiaoxiong_translator_stats',
                  JSON.stringify(ChineseTranslator.getStats()));
              } catch(e) {}
              break;
            case 'scan':
              ChineseTranslator.scan();
              break;
            case 'reset':
              ChineseTranslator.reset();
              break;
          }
        }
      });
    })();
  </script>
</body>
</html>
