<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="64" cy="64" r="60" fill="url(#bg)" stroke="#e8b84b" stroke-width="3"/>
  <!-- Scroll/document icon -->
  <rect x="38" y="32" rx="4" ry="4" width="52" height="64" fill="#1e2a4a" stroke="#e8b84b" stroke-width="2"/>
  <rect x="42" y="38" rx="2" width="44" height="3" fill="#e8b84b" opacity="0.8"/>
  <rect x="42" y="45" rx="2" width="44" height="3" fill="#e8b84b" opacity="0.5"/>
  <rect x="42" y="52" rx="2" width="30" height="3" fill="#e8b84b" opacity="0.5"/>
  <!-- Chinese character 汉 -->
  <text x="64" y="80" font-family="serif" font-size="32" font-weight="bold" fill="#e8b84b" text-anchor="middle" dominant-baseline="central">汉</text>
  <!-- Small stars -->
  <circle cx="42" cy="28" r="2" fill="#e8b84b" opacity="0.6"/>
  <circle cx="86" cy="28" r="2" fill="#e8b84b" opacity="0.6"/>
  <circle cx="64" cy="100" r="2" fill="#e8b84b" opacity="0.6"/>
</svg>
