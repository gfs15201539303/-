<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>枭雄汉化</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header class="header">
      <div class="logo">
        <svg viewBox="0 0 24 24" class="logo-icon">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z" fill="currentColor"/>
        </svg>
        <h1>枭雄汉化</h1>
      </div>
      <span class="version">v1.0.0</span>
    </header>

    <!-- Tabs -->
    <nav class="tabs">
      <button class="tab active" data-tab="translate" id="tabTranslate">
        <svg viewBox="0 0 24 24" width="16" height="16"><path d="M12.87 15.07l-2.54-2.51.03-.03A17.52 17.52 0 0014.07 6H17V4h-7V2H8v2H1v1.99h11.17C11.5 7.92 10.44 9.75 9 11.35 8.07 10.32 7.3 9.19 6.69 8h-2c.73 1.63 1.73 3.17 2.98 4.56l-5.09 5.02L4 19l5-5 3.11 3.11.76-2.04zM18.5 10h-2L12 22h2l1.12-3h4.75L21 22h2l-4.5-12zm-2.62 7l1.62-4.33L19.12 17h-3.24z" fill="currentColor"/></svg>
        词典翻译
      </button>
      <button class="tab" data-tab="settings" id="tabSettings">
        <svg viewBox="0 0 24 24" width="16" height="16"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 00.12-.61l-1.92-3.32a.488.488 0 00-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 00-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58a.49.49 0 00-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6A3.6 3.6 0 1115.6 12 3.611 3.611 0 0112 15.6z" fill="currentColor"/></svg>
        设置
      </button>
    </nav>

    <!-- Translate Panel -->
    <section class="panel active" id="panelTranslate">
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="搜索英文术语..." />
        <button id="clearBtn" class="clear-btn" title="清空">
          <svg viewBox="0 0 24 24" width="18" height="18"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z" fill="currentColor"/></svg>
        </button>
      </div>

      <div class="category-tags" id="categoryTags">
        <span class="tag active" data-cat="all">全部</span>
        <span class="tag" data-cat="combat">战斗</span>
        <span class="tag" data-cat="skill">技能</span>
        <span class="tag" data-cat="item">物品</span>
        <span class="tag" data-cat="spell">法术</span>
        <span class="tag" data-cat="rule">规则</span>
        <span class="tag" data-cat="class">职业</span>
        <span class="tag" data-cat="race">种族</span>
      </div>

      <div class="dict-list" id="dictList">
        <!-- Rendered by JS -->
        <div class="loading">加载词典中...</div>
      </div>

      <div class="stats-bar" id="statsBar">
        <span id="entryCount">0</span> 个词条
      </div>
    </section>

    <!-- Settings Panel -->
    <section class="panel" id="panelSettings">
      <div class="setting-group">
        <h3>显示设置</h3>
        <label class="setting-row">
          <span>翻译悬浮提示</span>
          <input type="checkbox" id="showTooltip" checked />
        </label>
        <label class="setting-row">
          <span>自动翻译棋子名称</span>
          <input type="checkbox" id="autoTranslate" />
        </label>
        <label class="setting-row">
          <span>显示原文对照</span>
          <input type="checkbox" id="showOriginal" checked />
        </label>
      </div>
      <div class="setting-group">
        <h3>关于</h3>
        <div class="about-text">
          <p>枭雄汉化插件为 <strong>TheOpenBuild</strong> 规则系统提供中文翻译支持。</p>
          <p>词条数量: <span id="totalEntries">0</span></p>
          <p class="hint">在 Owlbear Rodeo 中添加本插件后，可随时查阅术语翻译。</p>
        </div>
      </div>
    </section>

    <!-- Toast -->
    <div class="toast" id="toast"></div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
